<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EyeWire Stats Widget — demo</title>
  <!--
    Repo-root redirect to the live demo in /docs.

    This lets GitHub Pages serve the interactive demo even when Pages is
    configured to publish from the repository root (the default) instead of the
    /docs folder. If Pages is set to publish from /docs, this file simply isn't
    served and docs/index.html is the homepage directly — either way works.
  -->
  <meta http-equiv="refresh" content="0; url=./docs/" />
  <style>
    html, body { height: 100%; margin: 0; }
    body {
      display: grid;
      place-items: center;
      background: #0a0e1a;
      color: #8aa0c8;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    a { color: #38bdf8; }
  </style>
</head>
<body>
  <p>Redirecting to the <a href="./docs/">EyeWire Stats Widget demo</a>…</p>
  <script>location.replace("./docs/");</script>
</body>
</html>
