name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # No dependencies to install — the project uses only Node's standard
      # library (node:test, node:fs, ...).
      - name: Run tests
        run: npm test

      - name: Rebuild bundle
        run: npm run build

      - name: Ensure committed bundle is in sync with src/
        run: |
          if ! git diff --exit-code dist/ docs/eyewire-widget.js; then
            echo "::error::dist/ and docs/eyewire-widget.js are stale. Run 'npm run build' and commit the result."
            exit 1
          fi
