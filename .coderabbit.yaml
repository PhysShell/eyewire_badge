# CodeRabbit configuration — https://docs.coderabbit.ai/guides/configure-coderabbit
#
# The widget bundle is generated from src/ by `node build.mjs` and committed to
# three locations (repo root, dist/, docs/) purely for distribution. CI's
# bundle-sync gate guarantees they match src/, so these are build artifacts, not
# authored source — exclude them from review (otherwise things like docstring
# coverage are measured against concatenated/processed output, not real code).
reviews:
  path_filters:
    - "!eyewire-widget.js"
    - "!dist/**"
    - "!docs/eyewire-widget.js"
  # The docstring-coverage pre-merge check measures the whole PR diff, including
  # the generated bundle above, so it can't be excluded via path_filters and
  # reports a false ~50%. The authored modules in src/ are documented; turn the
  # check off rather than chase coverage on build output. ("off" is quoted so
  # YAML keeps it a string instead of the boolean false.)
  pre_merge_checks:
    docstrings:
      mode: "off"
